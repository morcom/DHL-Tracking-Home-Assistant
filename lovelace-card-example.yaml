# Lovelace card examples (Polish default)
# Language-specific versions:
# - lovelace-card-example-pl.yaml
# - lovelace-card-example-en.yaml
# - lovelace-card-example-nl.yaml

# 1) Karta podsumowania (zawsze stale encje)
type: entities
title: DHL Parcels
entities:
  - entity: sensor.dhl_parcel_count
    name: Liczba paczek
  - entity: sensor.dhl_tracking_details
    name: Tracking i nadawcy
  - entity: sensor.dhl_delivered_details
    name: Szczegóły doręczonych
  - entity: sensor.dhl_parcel_voice_summary
    name: Podsumowanie głosowe

# 2) Karta markdown z listą WSZYSTKICH paczek (dynamiczna)
---
type: markdown
title: DHL - Szczegóły paczek
content: |
  {% set ignore = ['sensor.dhl_parcel_count', 'sensor.dhl_parcel_voice_summary', 'sensor.dhl_tracking_details', 'sensor.dhl_delivered_details'] %}
  {% set ns = namespace(found=0) %}
  {% for s in states.sensor %}
    {% if s.entity_id.startswith('sensor.dhl_parcel_') and s.entity_id not in ignore and states(s.entity_id) not in ['unknown', 'unavailable', 'none', 'None'] %}
      {% set ns.found = ns.found + 1 %}
      {% set sender = state_attr(s.entity_id, 'sender') or 'Nieznany nadawca' %}
      {% set status = state_attr(s.entity_id, 'status_pl') or states(s.entity_id) %}
      {% set tcode = state_attr(s.entity_id, 'tracking_code') or s.name %}
      {% set dfrom = state_attr(s.entity_id, 'delivery_time_from') %}
      {% set dto = state_attr(s.entity_id, 'delivery_time_to') %}
      {% set dday = state_attr(s.entity_id, 'delivery_day_label') %}
      {% set delivered = state_attr(s.entity_id, 'delivered_at') %}

  **{{ ns.found }}. Paczka: {{ tcode }}**
  - Nadawca: {{ sender }}
  - Status: {{ status }}
      {% if delivered %}
  - Doręczona o: {{ as_datetime(delivered).strftime('%H:%M') }}
      {% elif dfrom and dto %}
  - Przewidywane doręczenie: {{ dday or 'wkrótce' }}, {{ as_datetime(dfrom).strftime('%H:%M') }} - {{ as_datetime(dto).strftime('%H:%M') }}
      {% else %}
  - Termin doręczenia: brak danych
      {% endif %}
  - [Śledź online]({{ state_attr(s.entity_id, 'tracking_url') }})

    {% endif %}
  {% endfor %}

  {% if ns.found == 0 %}
  Brak aktywnych paczek DHL.
  {% endif %}

---

# 3) Karta markdown: ostatnio doręczone paczki (ostatnie X dni retencji)
type: markdown
title: DHL - Ostatnio doręczone
content: |
  {% set ignore = ['sensor.dhl_parcel_count', 'sensor.dhl_parcel_voice_summary', 'sensor.dhl_tracking_details', 'sensor.dhl_delivered_details'] %}
  {% set delivered = [] %}
  {% for s in states.sensor %}
    {% if s.entity_id.startswith('sensor.dhl_parcel_') and s.entity_id not in ignore and states(s.entity_id) not in ['unknown', 'unavailable', 'none', 'None'] %}
      {% set delivered_at = state_attr(s.entity_id, 'delivered_at') %}
      {% if delivered_at %}
        {% set delivered = delivered + [
          {
            'entity_id': s.entity_id,
            'tracking': state_attr(s.entity_id, 'tracking_code') or s.name,
            'sender': state_attr(s.entity_id, 'sender') or 'Nieznany nadawca',
            'status': state_attr(s.entity_id, 'status_pl') or states(s.entity_id),
            'delivered_at': delivered_at,
            'delivery_location': state_attr(s.entity_id, 'delivery_location')
          }
        ] %}
      {% endif %}
    {% endif %}
  {% endfor %}

  {% set sorted = delivered | sort(attribute='delivered_at', reverse=true) %}
  {% if sorted | length == 0 %}
  Brak doręczonych paczek w aktualnym oknie retencji.
  {% else %}
  {% for p in sorted %}
  **{{ loop.index }}. Paczka: {{ p.tracking }}**
  - Nadawca: {{ p.sender }}
  - Status: {{ p.status }}
  - Doręczona o: {{ as_datetime(p.delivered_at).strftime('%H:%M') }}
  - Lokalizacja: {{ p.delivery_location or 'brak danych' }}

  {% endfor %}
  {% endif %}
