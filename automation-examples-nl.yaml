# DHL Parcel NL automatiseringsvoorbeelden (Home Assistant 2026) - Nederlands
# Vervang TTS/media entiteiten door je eigen entiteiten.

# A0) Nieuw pakket gedetecteerd
- alias: "DHL - nieuw pakket (NL)"
  id: dhl_parcel_discovered_nl
  mode: queued
  max_exceeded: silent
  triggers:
    - trigger: event.received
      entity_id: event.dhl_parcel_netherlands_dhl_parcel_discovered
      event_type: dhl_parcel_discovered
  actions:
    - variables:
        attrs: "{{ trigger.to_state.attributes if trigger is defined and trigger.to_state is defined and trigger.to_state else {} }}"
        data: "{{ attrs.get('data', {}) }}"
        sender: "{{ attrs.get('sender') or data.get('shipper_name') or data.get('sender_name') or 'onbekende afzender' }}"
        tracking: "{{ attrs.get('tracking_code', 'unknown') }}"
        status: "{{ attrs.get('status_localized') or attrs.get('status') or data.get('status_nl') or data.get('status_category') or 'UNKNOWN' }}"
    - action: tts.speak
      target:
        entity_id: tts.home_assistant_cloud
      data:
        cache: false
        media_player_entity_id: media_player.living_room
        message: "Nieuw DHL pakket {{ tracking }} van {{ sender }}. Huidige status: {{ status }}."

# A) Status gewijzigd
- alias: "DHL - status gewijzigd (NL)"
  id: dhl_status_changed_nl
  mode: queued
  max_exceeded: silent
  triggers:
    - trigger: event.received
      entity_id: event.dhl_parcel_netherlands_dhl_parcel_status_changed
      event_type: dhl_parcel_status_changed
  actions:
    - variables:
        attrs: "{{ trigger.to_state.attributes if trigger is defined and trigger.to_state is defined and trigger.to_state else {} }}"
        sender: "{{ attrs.get('sender') or attrs.get('data', {}).get('shipper_name') or attrs.get('data', {}).get('sender_name') or 'onbekende afzender' }}"
        tracking: "{{ attrs.get('tracking_code', 'unknown') }}"
        new_status: "{{ attrs.get('new_status_localized') or attrs.get('new_status') or attrs.get('status_localized') or attrs.get('status') or 'unknown' }}"
    - action: tts.speak
      target:
        entity_id: tts.home_assistant_cloud
      data:
        cache: false
        media_player_entity_id: media_player.living_room
        message: "DHL pakket {{ tracking }} van {{ sender }} heeft nu status {{ new_status }}."

# B) Leveringsvenster gewijzigd
- alias: "DHL - leveringsvenster (NL)"
  id: dhl_delivery_window_nl
  mode: queued
  max_exceeded: silent
  triggers:
    - trigger: event.received
      entity_id: event.dhl_parcel_netherlands_dhl_parcel_delivery_window_changed
      event_type: dhl_parcel_delivery_window_changed
  actions:
    - variables:
        attrs: "{{ trigger.to_state.attributes if trigger is defined and trigger.to_state is defined and trigger.to_state else {} }}"
        sender: "{{ attrs.get('sender') or attrs.get('data', {}).get('shipper_name') or attrs.get('data', {}).get('sender_name') or 'onbekende afzender' }}"
        tf_raw: "{{ attrs.get('new_delivery_timeframe') or attrs.get('data', {}).get('delivery_timeframe') }}"
        tf_from_iso: >
          {% if tf_raw is string and '/' in tf_raw %}{{ tf_raw.split('/')[0] }}{% elif tf_raw is mapping %}{{ tf_raw.get('from') }}{% else %}{{ None }}{% endif %}
        tf_to_iso: >
          {% if tf_raw is string and '/' in tf_raw %}{{ tf_raw.split('/')[1] }}{% elif tf_raw is mapping %}{{ tf_raw.get('to') }}{% else %}{{ None }}{% endif %}
        from_time: "{{ as_datetime(tf_from_iso).strftime('%H:%M') if tf_from_iso else 'onbekend' }}"
        to_time: "{{ as_datetime(tf_to_iso).strftime('%H:%M') if tf_to_iso else 'onbekend' }}"
    - action: tts.speak
      target:
        entity_id: tts.home_assistant_cloud
      data:
        cache: false
        media_player_entity_id: media_player.living_room
        message: "DHL pakket van {{ sender }} wordt verwacht tussen {{ from_time }} en {{ to_time }}."

# C) Bezorgd
- alias: "DHL - bezorgd (NL)"
  id: dhl_delivered_nl
  mode: queued
  max_exceeded: silent
  triggers:
    - trigger: event.received
      entity_id: event.dhl_parcel_netherlands_dhl_parcel_status_changed
      event_type: dhl_parcel_status_changed
  conditions:
    - condition: template
      value_template: "{{ (trigger.to_state.attributes.get('new_status') or '') == 'DELIVERED' }}"
  actions:
    - variables:
        attrs: "{{ trigger.to_state.attributes if trigger is defined and trigger.to_state is defined and trigger.to_state else {} }}"
        data: "{{ attrs.get('data', {}) }}"
        sender: "{{ attrs.get('sender') or data.get('shipper_name') or data.get('sender_name') or 'onbekende afzender' }}"
        tracking: "{{ attrs.get('tracking_code', 'unknown') }}"
        delivered_at: "{{ data.get('delivered_at') }}"
        delivered_time: "{{ as_datetime(delivered_at).strftime('%H:%M') if delivered_at else now().strftime('%H:%M') }}"
    - action: tts.speak
      target:
        entity_id: tts.home_assistant_cloud
      data:
        cache: false
        media_player_entity_id: media_player.living_room
        message: "DHL pakket {{ tracking }} van {{ sender }} is bezorgd om {{ delivered_time }}."
