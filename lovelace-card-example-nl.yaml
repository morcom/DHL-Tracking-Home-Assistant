# KAART 1: Snel DHL-overzicht
# Toont:
# - aantal actieve pakketten,
# - tracking/afzender overzicht,
# - stemvriendelijke samenvattingssensor.
type: entities
title: DHL Pakketten
entities:
  - entity: sensor.dhl_parcel_count
    name: Aantal pakketten
  - entity: sensor.dhl_tracking_details
    name: Tracking en afzenders
  - entity: sensor.dhl_delivered_details
    name: Bezorgde details
  - entity: sensor.dhl_parcel_voice_summary
    name: Spraakoverzicht
  - entity: sensor.dhl_parcel_delivered_summary
    name: Samenvatting bezorgd

---

# KAART 2: Dynamische lijst van alle DHL-pakketten
# Toont per pakket:
# - trackingnummer,
# - afzender,
# - huidige status,
# - verwacht levervenster of bezorgtijd,
# - directe trackinglink.
type: markdown
title: DHL - Pakketdetails
content: |
  {% set rows = state_attr('sensor.dhl_tracking_details', 'tracking_details') or [] %}
  {% if rows | length == 0 %}
  Geen actieve DHL-pakketten.
  {% else %}
  {% for p in rows %}
  **{{ loop.index }}. Pakket: {{ p.tracking_code }}**
  - Afzender: {{ p.sender or 'Onbekende afzender' }}
  - Status: {{ p.status_localized or p.status or 'onbekend' }}
  {% if p.delivery_time_from and p.delivery_time_to %}
  - Verwachte levering: {{ p.delivery_day_label_localized or p.delivery_day_label or 'binnenkort' }}, {{ p.delivery_time_from_hhmm or as_datetime(p.delivery_time_from).strftime('%H:%M') }} - {{ p.delivery_time_to_hhmm or as_datetime(p.delivery_time_to).strftime('%H:%M') }}
  {% else %}
  - Verwachte levering: geen gegevens
  {% endif %}
  {% if p.tracking_code %}
  - [Online volgen](https://www.dhlparcel.nl/nl/volg-uw-zending-0?tt={{ p.tracking_code }})
  {% endif %}

  {% endfor %}
  {% endif %}

---

# KAART 3: Recent bezorgde DHL-pakketten (laatste X retentiedagen)
# Toont:
# - alleen bezorgde pakketten,
# - bezorgtijd,
# - bezorglocatie indien beschikbaar,
# - sortering van nieuw naar oud.
type: markdown
title: DHL - Recent bezorgd
content: |
  {% set rows = state_attr('sensor.dhl_delivered_details', 'delivered_details') or [] %}
  {% if rows | length == 0 %}
  Geen bezorgde pakketten in het huidige retentievenster.
  {% else %}
  {% for p in rows %}
  **{{ loop.index }}. Pakket: {{ p.tracking_code }}**
  - Afzender: {{ p.sender }}
  - Status: {{ p.status_localized or p.status }}
  - Bezorgd: {{ p.delivered_day_label or 'recent' }} om {{ p.delivered_at_hhmm or as_datetime(p.delivered_at).strftime('%H:%M') }}
  - Bezorglocatie: {{ p.delivery_location or 'geen gegevens' }}

  {% endfor %}
  {% endif %}
