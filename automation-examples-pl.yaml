# Przykłady automatyzacji DHL Parcel NL (Home Assistant 2026) - Polski
# Podmień encje TTS/media na swoje.

# A0) Wykryto nową paczkę
- alias: "DHL - nowa paczka (PL)"
  id: dhl_parcel_discovered_pl
  mode: queued
  max_exceeded: silent
  triggers:
    - trigger: event.received
      entity_id: event.dhl_parcel_netherlands_dhl_parcel_discovered
      event_type: dhl_parcel_discovered
  actions:
    - variables:
        attrs: "{{ trigger.to_state.attributes if trigger is defined and trigger.to_state is defined and trigger.to_state else {} }}"
        data: "{{ attrs.get('data', {}) }}"
        sender: "{{ attrs.get('sender') or data.get('shipper_name') or data.get('sender_name') or 'nieznany nadawca' }}"
        tracking: "{{ attrs.get('tracking_code', 'unknown') }}"
        status: "{{ attrs.get('status_localized') or attrs.get('status') or data.get('status_pl') or data.get('status_category') or 'UNKNOWN' }}"
    - action: tts.speak
      target:
        entity_id: tts.piper_2
      data:
        cache: false
        media_player_entity_id: media_player.office
        message: "Wykryto nową paczkę DHL {{ tracking }} od {{ sender }}. Aktualny status: {{ status }}."

# A) Zmiana statusu
- alias: "DHL - zmiana statusu (PL)"
  id: dhl_status_changed_pl
  mode: queued
  max_exceeded: silent
  triggers:
    - trigger: event.received
      entity_id: event.dhl_parcel_netherlands_dhl_parcel_status_changed
      event_type: dhl_parcel_status_changed
  actions:
    - variables:
        attrs: "{{ trigger.to_state.attributes if trigger is defined and trigger.to_state is defined and trigger.to_state else {} }}"
        sender: "{{ attrs.get('sender') or attrs.get('data', {}).get('shipper_name') or attrs.get('data', {}).get('sender_name') or 'nieznany nadawca' }}"
        tracking: "{{ attrs.get('tracking_code', 'unknown') }}"
        new_status: "{{ attrs.get('new_status_localized') or attrs.get('new_status') or attrs.get('status_localized') or attrs.get('status') or 'unknown' }}"
    - action: tts.speak
      target:
        entity_id: tts.piper_2
      data:
        cache: false
        media_player_entity_id: media_player.office
        message: "Paczka DHL {{ tracking }} od {{ sender }} zmieniła status na {{ new_status }}."

# B) Zmiana okna doręczenia
- alias: "DHL - okno doręczenia (PL)"
  id: dhl_delivery_window_pl
  mode: queued
  max_exceeded: silent
  triggers:
    - trigger: event.received
      entity_id: event.dhl_parcel_netherlands_dhl_parcel_delivery_window_changed
      event_type: dhl_parcel_delivery_window_changed
  actions:
    - variables:
        attrs: "{{ trigger.to_state.attributes if trigger is defined and trigger.to_state is defined and trigger.to_state else {} }}"
        sender: "{{ attrs.get('sender') or attrs.get('data', {}).get('shipper_name') or attrs.get('data', {}).get('sender_name') or 'nieznany nadawca' }}"
        tf_raw: "{{ attrs.get('new_delivery_timeframe') or attrs.get('data', {}).get('delivery_timeframe') }}"
        tf_from_iso: >
          {% if tf_raw is string and '/' in tf_raw %}{{ tf_raw.split('/')[0] }}{% elif tf_raw is mapping %}{{ tf_raw.get('from') }}{% else %}{{ None }}{% endif %}
        tf_to_iso: >
          {% if tf_raw is string and '/' in tf_raw %}{{ tf_raw.split('/')[1] }}{% elif tf_raw is mapping %}{{ tf_raw.get('to') }}{% else %}{{ None }}{% endif %}
        from_time: "{{ as_datetime(tf_from_iso).strftime('%H:%M') if tf_from_iso else 'nieznana' }}"
        to_time: "{{ as_datetime(tf_to_iso).strftime('%H:%M') if tf_to_iso else 'nieznana' }}"
    - action: tts.speak
      target:
        entity_id: tts.piper_2
      data:
        cache: false
        media_player_entity_id: media_player.office
        message: "Paczka DHL od {{ sender }} będzie doręczana między {{ from_time }} a {{ to_time }}."

# C) Doręczona
- alias: "DHL - doręczona (PL)"
  id: dhl_delivered_pl
  mode: queued
  max_exceeded: silent
  triggers:
    - trigger: event.received
      entity_id: event.dhl_parcel_netherlands_dhl_parcel_status_changed
      event_type: dhl_parcel_status_changed
  conditions:
    - condition: template
      value_template: "{{ (trigger.to_state.attributes.get('new_status') or '') == 'DELIVERED' }}"
  actions:
    - variables:
        attrs: "{{ trigger.to_state.attributes if trigger is defined and trigger.to_state is defined and trigger.to_state else {} }}"
        data: "{{ attrs.get('data', {}) }}"
        sender: "{{ attrs.get('sender') or data.get('shipper_name') or data.get('sender_name') or 'nieznany nadawca' }}"
        tracking: "{{ attrs.get('tracking_code', 'unknown') }}"
        delivered_at: "{{ data.get('delivered_at') }}"
        delivered_time: "{{ as_datetime(delivered_at).strftime('%H:%M') if delivered_at else now().strftime('%H:%M') }}"
    - action: tts.speak
      target:
        entity_id: tts.piper_2
      data:
        cache: false
        media_player_entity_id: media_player.office
        message: "Paczka DHL {{ tracking }} od {{ sender }} została doręczona o {{ delivered_time }}."
